version: "3.8"

services:
  echoai-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: echoai-web:latest
    ports:
      - "3001:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    restart: unless-stopped

